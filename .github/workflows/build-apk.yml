name: Build Android APK & AAB
# Trigger build: July 20, 2026

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build_apk:
    name: Build Android App (APK & AAB)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2.1'
          cache-disabled: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Packages
        run: |
          npm ci

      - name: Compile React Frontend
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: |
          npm run build

      - name: Synchronize Capacitor Assets
        run: |
          npx cap sync android

      - name: Prepare Signing Config
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            python3 -c "import base64, os; data=base64.b64decode(os.environ['ANDROID_KEYSTORE_BASE64'].strip()); open('android/app/space-station-release.jks', 'wb').write(data)" 2>/dev/null || echo "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n ' | base64 --decode > android/app/space-station-release.jks 2>/dev/null || true
            if [ -s android/app/space-station-release.jks ]; then
              echo "storeFile=space-station-release.jks" > android/keystore.properties
              echo "storePassword=$ANDROID_KEYSTORE_PASSWORD" >> android/keystore.properties
              echo "keyAlias=$ANDROID_KEY_ALIAS" >> android/keystore.properties
              echo "keyPassword=$ANDROID_KEY_PASSWORD" >> android/keystore.properties
              echo "Keystore successfully created at android/app/space-station-release.jks"
              ls -lh android/app/space-station-release.jks
            else
              echo "Warning: Keystore base64 decoding produced empty file. Removing corrupt keystore."
              rm -f android/app/space-station-release.jks
            fi
          else
            echo "No ANDROID_KEYSTORE_BASE64 secret provided. Gradle will produce unsigned/debug-signed release artifacts."
          fi

      - name: Debug Gradle Environment
        run: |
          echo "GRADLE_OPTS=$GRADLE_OPTS"
          env | grep GRADLE || true
          
            - name: Debug Gradle Wrapper
        run: |
          cd android

          echo "Current directory:"
          pwd

          echo ""
          echo "Android folder:"
          ls -lah

          echo ""
          echo "Wrapper folder:"
          ls -lah gradle/wrapper

          echo ""
          echo "gradlew size:"
          wc -c gradlew

          echo ""
          echo "gradle-wrapper.jar size:"
          wc -c gradle/wrapper/gradle-wrapper.jar

          echo ""
          echo "jar file type:"
          file gradle/wrapper/gradle-wrapper.jar || true

          echo ""
          echo "SHA256:"
          sha256sum gradle/wrapper/gradle-wrapper.jar || true

          echo ""
          echo "First 5 lines of gradlew:"
          head -5 gradlew
      - name: Build Android App with Gradle
        env:
          RELEASE_STORE_FILE: space-station-release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease --stacktrace --no-daemon

      - name: Save APK and AAB Artifacts
        run: |
          mkdir -p build-artifacts
          echo "Searching for generated APK files..."
          find android/ -name "*.apk" 2>/dev/null || true
          
          APK_PATH=$(find android/ -name "*release*.apk" 2>/dev/null | head -n 1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find android/ -name "*.apk" 2>/dev/null | head -n 1)
          fi

          if [ -n "$APK_PATH" ]; then
            echo "Found APK at $APK_PATH"
            cp "$APK_PATH" build-artifacts/SpaceStationCommander.apk
          else
            echo "Error: Release APK not found!" && exit 1
          fi

          echo "Searching for generated AAB files..."
          find android/ -name "*.aab" 2>/dev/null || true
          
          AAB_PATH=$(find android/ -name "*release*.aab" 2>/dev/null | head -n 1)
          if [ -z "$AAB_PATH" ]; then
            AAB_PATH=$(find android/ -name "*.aab" 2>/dev/null | head -n 1)
          fi

          if [ -n "$AAB_PATH" ]; then
            echo "Found AAB at $AAB_PATH"
            cp "$AAB_PATH" build-artifacts/SpaceStationCommander.aab
          else
            echo "Error: Release AAB not found!" && exit 1
          fi

      - name: Upload Downloadable APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpaceStationCommander-APK
          path: build-artifacts/SpaceStationCommander.apk
          retention-days: 7

      - name: Upload Downloadable AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpaceStationCommander-AAB
          path: build-artifacts/SpaceStationCommander.aab
          retention-days: 7

