name: Build Android APK & AAB

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build_apk:
    name: Build Android App (APK & AAB)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2.1'
          cache-disabled: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Packages
        run: |
          npm ci || npm install

      - name: Compile React Frontend
        run: |
          npm run build

      - name: Synchronize Capacitor Assets
        run: |
          npx cap sync android

      - name: Generate Gradle Wrapper
        run: |
          cd android
          gradle wrapper

      - name: Build Android APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Build Android AAB with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --stacktrace --no-daemon

      - name: Rename Artifacts for Release
        run: |
          # Rename the debug APK
          mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/SpaceStationCommander.apk
          
          # Find and copy the built AAB (could be signed or unsigned)
          cp android/app/build/outputs/bundle/release/app-release*.aab android/app/build/outputs/bundle/release/SpaceStationCommander.aab

      - name: Upload Downloadable APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpaceStationCommander-APK
          path: android/app/build/outputs/apk/debug/SpaceStationCommander.apk
          retention-days: 7

      - name: Upload Downloadable AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpaceStationCommander-AAB
          path: android/app/build/outputs/bundle/release/SpaceStationCommander.aab
          retention-days: 7

