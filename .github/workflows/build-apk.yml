name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build_apk:
    name: Build Android App (APK)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Packages
        run: |
          npm ci || npm install

      - name: Compile React Frontend
        run: |
          npm run build

      - name: Synchronize Capacitor Assets
        run: |
          npx cap sync android

      - name: Build Android APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload Downloadable APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpaceStationCommander-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
