name: Build Android APK & AAB
# Trigger build: July 20, 2026

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build_apk:
    name: Build Android App (APK & AAB)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2.1'
          cache-disabled: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Packages
        run: |
          npm ci || npm install

      - name: Compile React Frontend
        run: |
          npm run build

      - name: Synchronize Capacitor Assets
        run: |
          npx cap sync android

      - name: Prepare Signing Config
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/space-station-release.jks
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=app/space-station-release.jks
          EOF

      - name: Build Android App with Gradle
        run: |
          cd android
          chmod +x gradlew
          if [ -f "key.properties" ]; then
            ./gradlew assembleRelease bundleRelease --stacktrace --no-daemon
          else
            ./gradlew assembleDebug bundleDebug --stacktrace --no-daemon
          fi

      - name: Save APK and AAB Artifacts
        run: |
          mkdir -p build-artifacts
          # Save APK
          if [ -f "android/app/build/outputs/apk/release/app-release.apk" ]; then
            cp android/app/build/outputs/apk/release/app-release.apk build-artifacts/SpaceStationCommander.apk
          elif [ -f "android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk build-artifacts/SpaceStationCommander.apk
          else
            cp android/app/build/outputs/apk/debug/app-debug.apk build-artifacts/SpaceStationCommander.apk
          fi
          # Save AAB
          if [ -f "android/app/build/outputs/bundle/release/app-release.aab" ]; then
            cp android/app/build/outputs/bundle/release/app-release.aab build-artifacts/SpaceStationCommander.aab
          elif [ -f "android/app/build/outputs/bundle/release/app-release-unsigned.aab" ]; then
            cp android/app/build/outputs/bundle/release/app-release-unsigned.aab build-artifacts/SpaceStationCommander.aab
          else
            cp android/app/build/outputs/bundle/debug/app-debug.aab build-artifacts/SpaceStationCommander.aab
          fi

      - name: Upload Downloadable APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpaceStationCommander-APK
          path: build-artifacts/SpaceStationCommander.apk
          retention-days: 7

      - name: Upload Downloadable AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpaceStationCommander-AAB
          path: build-artifacts/SpaceStationCommander.aab
          retention-days: 7

