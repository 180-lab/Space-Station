apply plugin: 'com.android.application'

android {
    namespace "com.omniorbitgames.spacestationcommander"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.omniorbitgames.spacestationcommander"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 2
        versionName "1.0.1"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()

if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def getReleaseSigningDetails = {
    def ksPath = keystoreProperties['storeFile'] ?: System.getenv("RELEASE_STORE_FILE")
    def ksStorePass = keystoreProperties['storePassword'] ?: System.getenv("RELEASE_STORE_PASSWORD")
    def ksAlias = keystoreProperties['keyAlias'] ?: System.getenv("RELEASE_KEY_ALIAS")
    def ksKeyPass = keystoreProperties['keyPassword'] ?: System.getenv("RELEASE_KEY_PASSWORD")

    if (!ksPath || !ksStorePass || !ksAlias || !ksKeyPass) {
        println "INFO: Incomplete release keystore configuration. Using debug signing."
        return null
    }

    def ksFile = file(ksPath)
    if (!ksFile.exists() || ksFile.length() == 0) {
        ksFile = rootProject.file(ksPath)
    }

    if (!ksFile.exists() || ksFile.length() == 0) {
        println "INFO: Keystore file '${ksPath}' not found or empty. Using debug signing."
        return null
    }

    boolean isValid = false
    def typesToTry = ["JKS", "PKCS12", java.security.KeyStore.getDefaultType()]
    for (String ksType in typesToTry) {
        if (isValid) break
        try {
            def ks = java.security.KeyStore.getInstance(ksType)
            ksFile.withInputStream { is ->
                ks.load(is, ksStorePass.toCharArray())
            }
            if (ks.containsAlias(ksAlias)) {
                def key = ks.getKey(ksAlias, ksKeyPass.toCharArray())
                if (key != null) {
                    isValid = true
                    println "SUCCESS: Verified release keystore (${ksType}) with key alias '${ksAlias}'."
                }
            }
        } catch (Exception e) {
            // Bad password or wrong keystore type, try next
        }
    }

    if (isValid) {
        return [
            storeFile: ksFile,
            storePassword: ksStorePass,
            keyAlias: ksAlias,
            keyPassword: ksKeyPass
        ]
    } else {
        println "WARNING: Release keystore credentials or alias validation failed. Using debug signing."
        return null
    }
}

def validReleaseConfig = getReleaseSigningDetails()

if (validReleaseConfig != null) {
    signingConfigs {
        release {
            storeFile validReleaseConfig.storeFile
            storePassword validReleaseConfig.storePassword
            keyAlias validReleaseConfig.keyAlias
            keyPassword validReleaseConfig.keyPassword
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
} else {
    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
    lint {
        checkReleaseBuilds false
        abortOnError false
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.exists()) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
